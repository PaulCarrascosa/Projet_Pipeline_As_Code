# Configuration for publishing to Nexus Repository Manager
# This file contains settings for the Nexus artifact repository

# Nexus Repository Configuration
nexus.url=http://localhost:8081
nexus.repository=library-app
nexus.group=com.library
nexus.artifact=library-app

# Docker Registry Configuration (if using Nexus Docker Registry)
nexus.docker.registry=localhost:5000
nexus.docker.repository=library-app

# Build artifact settings
build.artifact.format=docker
build.artifact.name=library-app
build.artifact.classifier=

# Snapshot vs Release
nexus.release=false

# Credentials (set in Jenkins as secrets)
# nexus.username=admin
# nexus.password=nexus-password
